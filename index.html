  async function cropImageRegion(dataUrl, box) {
    return new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const W = img.naturalWidth, H = img.naturalHeight;
        const c = document.createElement("canvas");
        c.width = box.w * W; c.height = box.h * H;
        c.getContext("2d").drawImage(img, box.x*W, box.y*H, box.w*W, box.h*H, 0, 0, box.w*W, box.h*H);
        res(c.toDataURL("image/jpeg", 0.93));
      };
      img.src = dataUrl;
    });
  }

  async function extractWithAI() {
    if (!imgFiles.length) return;
    setAiLoading(true); setAiError("");
    try {
      const encoded = await Promise.all(imgFiles.map(async f => {
        const b64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.onerror = rej;
          r.readAsDataURL(f);
        });
        return { b64, mt: f.type || "image/jpeg" };
      }));
      const imgs = encoded.map(e => ({type:"image", source:{type:"base64", media_type: e.mt, data: e.b64}}));
      const data = await callAnthropic({
        model: "claude-sonnet-4-5",
        max_tokens: 1200,
        messages: [{role:"user", content: [...imgs, {type:"text", text:`Extraia a questão médica. Se houver exame de imagem indique região como proporções 0-1. Retorne SOMENTE JSON:\n{"enunciado":"...","alternativas":["A)...","B)...","C)...","D)...","E)..."],"correta":"A","explicacao":"...","tema":"...","area":"Clínica Médica","exameCrop":{"imgIndex":0,"x":0.05,"y":0.55,"w":0.90,"h":0.40}}\nSe não houver exame omita exameCrop. Área: Clínica Médica,Cirurgia,GO,Pediatria,Preventiva,Psiquiatria,Neurologia,Ortopedia,Outro.`}]}]
      });
      const text = data.content?.map(i => i.text || "").join("") || "";
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      let exameCropUrl = null;
      if (parsed.exameCrop) {
        const {imgIndex, x, y, w, h} = parsed.exameCrop;
        const src = imgPreviews[imgIndex??0];
        if (src) exameCropUrl = await cropImageRegion(src, {x,y,w,h});
      }
      setForm(f => ({...f,
        enunciado: parsed.enunciado||"",
        alternativas: parsed.alternativas?.length ? parsed.alternativas : ["","","","",""],
        correta: parsed.correta||"",
        explicacao: parsed.explicacao||"",
        tema: parsed.tema||"",
        area: AREAS.includes(parsed.area) ? parsed.area : f.area,
        exameCrop: exameCropUrl,
      }));
      showToast("Extraído com sucesso!");
    } catch (e) {
      setAiError(e.message.includes("API KEY") ? "Configure sua chave da API nas Configurações" : "Não foi possível extrair. Preencha manualmente.");
    }
    setAiLoading(false);
  }

  async function generateFlashcardAI(src) {
    const q = src || form;
    if (!q.enunciado) return;
    setAiLoading(true); setAiError("");
    try {
      const content = [];
      const imgs = q.comentarioImgs || [];
      for (const imgUrl of imgs) {
        const b64 = imgUrl.split(",")[1];
        const mt = imgUrl.match(/data:(.*?);/)?.[1] || "image/jpeg";
        content.push({type:"image", source:{type:"base64", media_type: mt, data: b64}});
      }
      const comentTxt = imgs.length>0 ? (q.comentario?`\nComentário (+ ${imgs.length} imagem(ns)): ${q.comentario}`:`\n(comentário nas imagens acima)`) : (q.comentario?`\nComentário: ${q.comentario}`:"");
      const erroTxt = q.alternativaMarcada && q.correta && q.alternativaMarcada!==q.correta ? `\nO estudante marcou ${q.alternativaMarcada} (errada). Correta: ${q.correta}. Foque no raciocínio que diferencia essas duas alternativas.` : "";
      content.push({type:"text", text:`Crie flashcard baseado nesta questão e comentário do professor. Retorne SOMENTE JSON:\n{"frente":"pergunta objetiva 1-2 frases","verso":"resposta com conceito-chave e raciocínio"}\nQuestão: ${q.enunciado}\nAlternativas: ${q.alternativas?.join(" ")}\nCorreta: ${q.correta}${erroTxt}${comentTxt}`});
      const data = await callAnthropic({
        model: "claude-sonnet-4-5",
        max_tokens: 3500,
        messages: [{role:"user", content}],
      });
      const text = data.content?.map(i => i.text || "").join("") || "";
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      const fc = {
        id: Date.now()+1, tipo: "flashcard",
        area: q.area, tema: q.tema,
        frente: parsed.frente, verso: parsed.verso,
        frenteImg: null, versoImg: null,

        origemSnapshot: {
          enunciado: q.enunciado||null, alternativas: q.alternativas||null,

          explicacao: q.explicacao||null, comentario: q.comentario||null,
          exameCrop: q.exameCrop||null,
        },
        interval: 1, repetitions: 0, easeFactor: 2.5,
        nextReview: today(), createdAt: today(), updatedAt: nowIso(),
      };
      setCards(prev => [...prev, fc]);
      showToast("Flashcard gerado!");
    } catch (e) {
      setAiError(e.message.includes("API KEY") ? "Configure sua chave da API nas Configurações" : "Erro ao gerar flashcard.");
    }
    setAiLoading(false);
  }

                        <button title="Tutor — perguntar sobre este card" style={iconBtnStyle()} onClick={e => {e.stopPropagation(); openTutorWithContext({...c, exameCrop: c.origemSnapshot?.exameCrop||null, enunciado: c.origemSnapshot?.enunciado||null, alternativas: c.origemSnapshot?.alternativas||null, correta: c.origemSnapshot?.correta||null, alternativaMarcada: c.origemSnapshot?.alternativaMarcada||null, explicacao: c.origemSnapshot?.explicacao||null, comentario: c.origemSnapshot?.comentario||null});}}>💬</button>
                        <button title="Gerar mais ângulos a partir deste card" style={iconBtnStyle("accent")} onClick={e => {e.stopPropagation(); gerarMaisAngulos(c);}}>✦</button>
                        {c.origemId && cards.find(x => x.id===c.origemId) && <button title="Ir para a questão vinculada" style={iconBtnStyle()} onClick={e => {e.stopPropagation(); setBankSearch(""); setBankTab("questoes"); setBankExpandedId(c.origemId); setBankHighlightId(c.origemId); setTimeout(()=>{const el=document.getElementById("card-"+c.origemId);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},80); setTimeout(()=>setBankHighlightId(null),2500);}}>📝</button>}
                        <button title="Editar" style={iconBtnStyle()} onClick={e => {e.stopPropagation(); setEditingCard(c);}}>✏️</button>
                        <button title="Excluir" style={iconBtnStyle("danger")} onClick={e => {e.stopPropagation(); deleteCard(c.id);}}>✕</button>
                      </div>
                    </div>
                      </div>
                    </div>
                  </div>
                );
              });
            })()}
            {(() => {
              const sq = bankSearch.toLowerCase().trim();
              const filtered = (bankFilter === "Todas" ? cards : cards.filter(c => c.area === bankFilter)).filter(c => !sq || [c.enunciado,c.tema,c.frente,c.verso,c.explicacao,c.comentario].some(f => f && f.toLowerCase().includes(sq)));
              const total = filtered.filter(c => c.tipo === (bankTab === "questoes" ? "questao" : "flashcard")).length;
              return total > bankPage * BANK_PAGE_SIZE ? <button onClick={() => setBankPage(p => p+1)} style={{...S.btn(),width:"100%",padding:"11px",marginTop:8,fontSize:13}}>Ver mais ({total - bankPage * BANK_PAGE_SIZE} restantes)</button> : null;
            })()}
          </div>
        )}

        {view === "review_start" && (
          <div>
            <div style={{...S.card,textAlign:"center",padding:"40px 18px 32px",marginBottom:12,background:`radial-gradient(ellipse 320px 200px at 50% -20%, ${COZY.peachSoft} 0%, transparent 70%), ${COZY.surface}`}}>
              <p style={{fontFamily:COZY.fontDisplay,fontSize:72,fontWeight:400,color:dueToday>0?COZY.peach:COZY.sage,marginBottom:0,lineHeight:0.9,letterSpacing:"-0.04em"}}>{dueToday}</p>
              <p style={{color:COZY.textSoft,fontSize:14,fontFamily:COZY.fontDisplay,fontStyle:"italic",marginTop:6}}>itens para revisar hoje</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {dueF > 0 && <button style={{...S.btn("primary"),padding:14}} onClick={() => startReview("flashcard")}>Revisar Flashcards ({dueF})</button>}
              {dueF > 0 && (
                <div style={{...S.card,marginBottom:0,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:COZY.textMute,letterSpacing:"0.06em",fontFamily:COZY.fontMono}}>sessão de</span>
                  <input
                    type="number" min="1" max={dueF}
                    placeholder={String(dueF)}
                    value={reviewLimit}
                    onChange={e => setReviewLimit(e.target.value.replace(/[^0-9]/g,""))}
                    style={{width:80,padding:"7px 10px",borderRadius:6,border:`1px solid ${COZY.lineSoft}`,background:COZY.bg2,color:COZY.text,fontSize:13,fontFamily:COZY.fontMono,outline:"none"}}
                  />
                  <span style={{fontSize:11,color:COZY.textMute,letterSpacing:"0.06em",fontFamily:COZY.fontMono}}>cards</span>
                  <button
                    disabled={!reviewLimit || Number(reviewLimit) < 1}
                    onClick={() => { startReview("flashcard", Number(reviewLimit)); }}
                    style={{...S.btn(),padding:"7px 14px",fontSize:12,marginLeft:"auto",opacity: !reviewLimit ? 0.5 : 1}}
                  >começar →</button>
                </div>
              )}
              {dueToday === 0 && <p style={{textAlign:"center",color:COZY.sage,padding:"32px 0",fontFamily:COZY.fontDisplay,fontStyle:"italic",fontSize:16}}>nenhuma revisão pendente hoje.</p>}
            </div>
          </div>
        )}

        {view === "review" && currentCard && (() => {
          const tint = areaTint(currentCard.area);
          const total = reviewQueue.length;
          return (
          <div style={{margin:"-16px -16px 0",display:"flex",flexDirection:"column",minHeight:"calc(100vh - 80px)"}}>
            {/* Top bar: progresso + ações */}
            <div style={{padding:"14px 22px 8px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:COZY.fontMono,fontSize:11,color:COZY.textMute}}>{reviewIdx+1}/{total}</span>
                <div style={{flex:1,height:3,background:COZY.surface,borderRadius:2,position:"relative",maxWidth:240}}>
                  <div style={{position:"absolute",inset:0,width:`${((reviewIdx+1)/total)*100}%`,background:COZY.peach,borderRadius:2}}/>
                </div>
              </div>
              <button title="Editar este flashcard" style={iconBtnStyle()} onClick={() => setEditingCard(currentCard)}>✏️</button>
              <button title="Tutor — perguntar sobre este card" style={iconBtnStyle()} onClick={() => openTutorWithContext({...currentCard})}>💬</button>
            </div>
            {/* Area pill */}
            <div style={{padding:"6px 22px 0",textAlign:"center"}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:8,color:tint,fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",fontWeight:600}}>
                <div style={{width:14,height:1,background:"currentColor"}}/>
                {currentCard.area}{currentCard.tema?<>· <span style={{fontStyle:"italic",fontFamily:COZY.fontDisplay,fontSize:13,fontWeight:400,letterSpacing:0,textTransform:"none"}}>{currentCard.tema}</span></>:null}
                <div style={{width:14,height:1,background:"currentColor"}}/>
              </span>
            </div>
            {/* Card central */}
            <div style={{flex:1,padding:"20px 22px",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div key={currentCard.id} className="cozy-scale-in" style={{width:"100%",background:COZY.surface,border:`1px solid ${COZY.line}`,borderRadius:14,padding:"24px 22px",position:"relative",boxShadow:"0 18px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04)"}}>
                {/* corner ornaments */}
                <div style={{position:"absolute",top:10,left:10,width:14,height:14,borderTop:`1.5px solid ${COZY.peach}`,borderLeft:`1.5px solid ${COZY.peach}`,opacity:0.5}}/>
                <div style={{position:"absolute",bottom:10,right:10,width:14,height:14,borderBottom:`1.5px solid ${COZY.peach}`,borderRight:`1.5px solid ${COZY.peach}`,opacity:0.5}}/>
                {currentCard.tipo === "questao" ? (
                  <React.Fragment>
                    {currentCard.exameCrop && <div style={{margin:"-24px -22px 14px",borderRadius:"14px 14px 0 0",overflow:"hidden"}}><ExamHeader src={currentCard.exameCrop} onZoom={setLightbox}/></div>}
                    <div style={{fontSize:9,color:COZY.textFaint,letterSpacing:"0.18em",textTransform:"uppercase",textAlign:"center",marginBottom:14,fontWeight:600}}>questão</div>
                    <div style={{fontSize:14,lineHeight:1.7,color:COZY.text,marginBottom: currentCard.enunciadoImgs?.length?8:14}}>{currentCard.enunciado}</div>
                    {currentCard.enunciadoImgs?.length > 0 && (
                      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
                        {currentCard.enunciadoImgs.map((src,i) => (
                          <img key={i} src={src} onClick={() => setLightbox(src)} style={{maxWidth:"100%",maxHeight:260,borderRadius:6,cursor:"zoom-in",objectFit:"contain",background:COZY.bg2,display:"block"}} alt={`img-${i}`}/>
                        ))}
                      </div>
                    )}
                    {currentCard.alternativas?.map((alt, i) => {
                      const l = ["A","B","C","D","E"][i];
                      const isC = l === currentCard.correta;
                      const ok = showAnswer && isC;
                      return <div key={l} style={{padding:"8px 12px",marginBottom:6,borderRadius:8,background: ok?COZY.sageSoft:COZY.bg2,border:`1px solid ${ok?COZY.sage+"60":COZY.lineSoft}`,fontSize:13,color: ok?COZY.sage:COZY.textSoft}}>{alt}</div>;
                    })}
                    {showAnswer && currentCard.explicacao && (
                      <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${COZY.lineSoft}`}}>
                        <div style={{fontSize:9,color:COZY.peach,letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:8,fontWeight:600}}>explicação</div>
                        <div style={{fontSize:13,color:COZY.textSoft,lineHeight:1.65}}>{currentCard.explicacao}</div>
                      </div>
                    )}
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div style={{fontSize:9,color:COZY.textFaint,letterSpacing:"0.18em",textTransform:"uppercase",textAlign:"center",marginBottom:14,fontWeight:600}}>frente</div>
                    <div style={{fontFamily:COZY.fontDisplay,fontWeight:400,fontSize:18,lineHeight:1.45,color:COZY.text,textAlign:"center"}} dangerouslySetInnerHTML={{__html: renderCardText(currentCard.frente)}}/>
                    {(currentCard.frenteImgs || (currentCard.frenteImg ? [currentCard.frenteImg] : [])).map((src,i) => <img key={i} src={src} onClick={() => setLightbox(src)} style={{maxWidth:"100%",borderRadius:8,margin:"14px auto 0",display:"block",cursor:"zoom-in"}} alt="frente"/>)}
                    {showAnswer && (
                      <React.Fragment>
                        <div style={{margin:"22px auto 14px",width:32,height:1,background:COZY.peach}}/>
                        <div style={{fontSize:9,color:COZY.peach,letterSpacing:"0.18em",textTransform:"uppercase",textAlign:"center",marginBottom:12,fontWeight:600}}>verso</div>
                        <div style={{fontSize:13,lineHeight:1.7,color:COZY.textSoft,textAlign:"left"}} dangerouslySetInnerHTML={{__html: renderCardText(currentCard.verso)}}/>
                        {(currentCard.versoImgs || (currentCard.versoImg ? [currentCard.versoImg] : [])).map((src,i) => <img key={i} src={src} onClick={() => setLightbox(src)} style={{maxWidth:"100%",borderRadius:8,marginTop:12,display:"block",cursor:"zoom-in"}} alt="verso"/>)}
                      </React.Fragment>
                    )}
                  </React.Fragment>
                )}
              </div>
            </div>
            {/* Actions */}
            <div style={{padding:"0 22px 22px",flexShrink:0}}>
              {!showAnswer ? (
                <button onClick={() => setShowAnswer(true)} style={{width:"100%",background:COZY.surface,color:COZY.text,border:`1px solid ${COZY.line}`,padding:13,fontSize:13,fontWeight:600,borderRadius:10,cursor:"pointer",fontFamily:COZY.font,letterSpacing:"0.02em"}}>mostrar verso</button>
              ) : (
                <div>
                  <div style={{fontSize:10,color:COZY.textMute,letterSpacing:"0.14em",textTransform:"uppercase",textAlign:"center",marginBottom:10,fontWeight:600}}>como foi?</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:6}}>
                    {[
                      {label:"errei",tint:COZY.rose,soft:COZY.roseSoft,grade:0},
                      {label:"difícil",tint:COZY.butter,soft:COZY.butterSoft,grade:2},
                      {label:"bom",tint:COZY.sage,soft:COZY.sageSoft,grade:3},
                      {label:"fácil",tint:COZY.peach,soft:COZY.peachSoft,grade:4},
                    ].map(b => {
                      const next = calcNextReview(currentCard, b.grade);
                      return (
                      <button key={b.label} onClick={() => gradeCard(b.grade)} style={{background:b.soft,border:`1px solid ${b.tint}40`,borderRadius:10,padding:"11px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:COZY.font}}>
                        <span style={{color:b.tint,fontSize:12,fontWeight:600}}>{b.label}</span>
                        <span style={{color:COZY.textMute,fontFamily:COZY.fontMono,fontSize:9}}>{fmtInterval(next.interval)}</span>
                      </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
          );
        })()}

        {view === "reviewDone" && (
          <div style={{...S.card,textAlign:"center",padding:"48px 18px",background:`radial-gradient(ellipse 280px 180px at 50% 0%, ${COZY.sageSoft} 0%, transparent 70%), ${COZY.surface}`}}>
            <p style={{fontSize:32,marginBottom:8}}>✦</p>
            <p style={{fontFamily:COZY.fontDisplay,fontStyle:"italic",fontSize:22,color:COZY.sage,marginBottom:8}}>sessão concluída.</p>
            <p style={{fontSize:13,color:COZY.textMute,marginBottom:24,fontFamily:COZY.fontMono}}>{reviewQueue.length} itens revisados</p>
            <button style={S.btn("primary")} onClick={() => setView("home")}>Voltar ao início</button>
          </div>
        )}
      </div>

      {/* Bottom tab bar (mobile) */}
      {isMobile && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:COZY.bg2,borderTop:`1px solid ${COZY.line}`,padding:"6px 6px max(10px, env(safe-area-inset-bottom)) 6px",display:"flex",justifyContent:"space-around",zIndex:850}}>
          {[
            {id:"home",label:"hoje",icon:"☀"},
            {id:"review_start",label:"revisar",icon:"↻"},
            {id:"add",label:"novo",icon:"+",primary:true},
            {id:"list",label:"banco",icon:"☷"},
            {id:"tutor",label:"tutor",icon:"✻"},
          ].map(it => {
            const active = it.id === view || (it.id==="review_start" && (view==="review" || view==="reviewDone"));
            if (it.primary) {
              return (
                <button key={it.id} onClick={() => setView("add")} style={{background:COZY.peach,color:COZY.bg,border:"none",width:46,height:46,borderRadius:23,fontSize:24,fontWeight:600,cursor:"pointer",marginTop:-12,boxShadow:`0 8px 18px ${COZY.peach}40`,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>{it.icon}</button>
              );
            }
            if (it.id === "tutor") {
              return (
                <button key={it.id} onClick={() => { if (view === "review" && currentCard) openTutorWithContext({...currentCard}); else setChatOpen(o => !o); }} style={{background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:chatOpen?COZY.peach:COZY.textMute,cursor:"pointer",padding:"4px 8px"}}>
                  <span style={{fontSize:18}}>{it.icon}</span>
                  <span style={{fontSize:9,letterSpacing:"0.06em",fontWeight:chatOpen?700:500,fontFamily:COZY.font}}>{it.label}</span>
                </button>
              );
            }
            return (
              <button key={it.id} onClick={() => setView(it.id)} style={{background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:active?COZY.peach:COZY.textMute,cursor:"pointer",padding:"4px 8px"}}>
                <span style={{fontSize:18}}>{it.icon}</span>
                <span style={{fontSize:9,letterSpacing:"0.06em",fontWeight:active?700:500,fontFamily:COZY.font}}>{it.label}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

// SM-2 estilo Anki — graus 2/3/4 produzem intervalos visivelmente diferentes
// (não só easeFactor que afeta revisões futuras)
function calcNextReview(card, grade) {
  let { interval=1, repetitions=0, easeFactor=2.5 } = card;
  if (grade < 2) {
    // ERREI: reseta
    interval = 1; repetitions = 0;
  } else {
    if (repetitions === 0) {
      // 1ª vez certa: difícil/bom = 1d, fácil = 4d
      interval = grade === 4 ? 4 : 1;
    } else if (repetitions === 1) {
      // 2ª vez certa: difícil = 3d, bom = 6d, fácil = 10d
      interval = grade === 2 ? 3 : grade === 4 ? 10 : 6;
    } else {
      // 3ª+: multiplicadores estilo Anki sobre o intervalo atual
      const mult = grade === 2 ? 1.2 : grade === 4 ? easeFactor * 1.3 : easeFactor;
      interval = Math.max(interval + 1, Math.round(interval * mult));
    }
    repetitions += 1;
    easeFactor = Math.max(1.3, easeFactor + 0.1 - (3 - grade) * (0.08 + (3 - grade) * 0.02));
  }
  const d = new Date(); d.setDate(d.getDate() + interval);
  return { interval, repetitions, easeFactor, nextReview: d.toISOString().split("T")[0] };
}

// Formata dias em label compacto (1d, 12d, 2m, 1.5a)
function fmtInterval(days) {
  const d = Math.max(1, Math.round(Number(days) || 1));
  if (d < 60) return d + "d";
  if (d < 365) return Math.round(d / 30) + "m";
  const y = d / 365;
  return (y >= 10 ? Math.round(y) : y.toFixed(1).replace(/\.0$/, "")) + "a";
}

// Matching fuzzy para import de CofCards do MedCof

// Normaliza texto: minúsculas, remove acentos, strip HTML/markdown,
// colapsa whitespace, remove pontuação. Estável para matching exato.
function normalizeText(s) {
  if (typeof s !== "string") return "";
  return s
    .normalize("NFD").replace(/[̀-ͯ]/g, "") // remove acentos
    .toLowerCase()
    .replace(/<[^>]+>/g, " ")                          // strip HTML
    .replace(/\*\*|__|\*|_|`/g, "")                    // strip markdown
    .replace(/[^\w\s]/g, " ")                          // remove pontuacao
    .replace(/\s+/g, " ")                              // colapsa whitespace
    .trim();
}
// Tokeniza em palavras com ≥ 3 caracteres (filtra stopwords curtas)
function tokenize(s) {
  return new Set(normalizeText(s).split(" ").filter(t => t.length >= 3));
}
// Jaccard similarity (0..1) — robusta a edição parcial de vinheta clínica
function jaccardSimilarity(a, b) {
  const ta = tokenize(a);
  const tb = tokenize(b);
  if (ta.size === 0 || tb.size === 0) return 0;
  let inter = 0;
  for (const t of ta) if (tb.has(t)) inter++;
  const union = ta.size + tb.size - inter;
  return union === 0 ? 0 : inter / union;
}

// Comprime só quando GRANDE. Imagens < 500KB (screenshots/texto) mantidas intactas

const _blobToDataUrl = (b) => new Promise((res, rej) => {
  const r = new FileReader(); r.onload = ev => res(ev.target.result); r.onerror = rej; r.readAsDataURL(b);
});
async function resizeImageToDataUrl(fileOrBlob, maxDim = 2000, quality = 0.82) {
  try {
    if (fileOrBlob.size && fileOrBlob.size < 500 * 1024) {
      return await _blobToDataUrl(fileOrBlob);
    }
    const bitmap = await createImageBitmap(fileOrBlob);
    const { width: W, height: H } = bitmap;
    const scale = Math.min(1, maxDim / Math.max(W, H));
    const w = Math.max(1, Math.round(W * scale));
    const h = Math.max(1, Math.round(H * scale));
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);
    ctx.drawImage(bitmap, 0, 0, w, h);
    if (bitmap.close) bitmap.close();
    const out = canvas.toDataURL("image/jpeg", quality);
    const orig = await _blobToDataUrl(fileOrBlob);
    return out.length < orig.length ? out : orig;
  } catch (e) {
    console.warn("[CAD] resizeImageToDataUrl falhou, usando cru:", e);
    return await _blobToDataUrl(fileOrBlob);
  }
}
// Calcula SHA1 do conteúdo no formato git-blob, pra diff-push
async function _gitBlobSha(content) {
  const enc = new TextEncoder();
  const contentBytes = enc.encode(content);
  const header = enc.encode(`blob ${contentBytes.length}\0`);
  const buf = new Uint8Array(header.length + contentBytes.length);
  buf.set(header, 0);
  buf.set(contentBytes, header.length);
  const hash = await crypto.subtle.digest("SHA-1", buf);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, "0")).join("");
}
function chunkCardsBytes(cards, maxBytes) {

    }
    cur.push(c);
    curBytes += s.length + 1;
  }
  if (cur.length) out.push(cur);
  return out;
}

  const chunks = [];

  for (const c of cards) {

    if (cur.length && curBytes + s.length + 1 > CHUNK_BYTES) {

// Bridge pro background (content-app.js faz o fetch pra api.github.com)
let _ghReqCounter = 0;
const _ghPending = new Map();
window.addEventListener("message", (ev) => {
  if (ev.source !== window) return;
  const msg = ev.data;
  if (msg?.type === "CAD_GIST_API_RESULT" && _ghPending.has(msg.reqId)) {
    const {resolve} = _ghPending.get(msg.reqId);
    _ghPending.delete(msg.reqId);
    resolve(msg);
  }
});
// Em file:// usa a extensão como bridge (evita CORS).
// Em https:// (GitHub Pages, mobile) chama a api.github.com direto — CORS é permitido.
async function callGithubDirect(method, path, token, body) {
  try {
    if (method === "GET_RAW") {
      const resp = await fetch(path, { headers: { "Authorization": "Bearer " + token } });
      if (!resp.ok) return { ok: false, status: resp.status, error: `HTTP ${resp.status}` };
      const data = await resp.text();
      return { ok: true, status: resp.status, data };
    }
    const resp = await fetch("https://api.github.com" + path, {
      method: method || "GET",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer " + token,
        "X-GitHub-Api-Version": "2022-11-28",
        ...(body ? { "Content-Type": "application/json" } : {})
      },
      body: body ? JSON.stringify(body) : undefined
    });
    const text = await resp.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch {}
    if (!resp.ok) {
      const errMsg = data?.message || `HTTP ${resp.status}`;
      return { ok: false, status: resp.status, error: errMsg, data };
    }
    return { ok: true, status: resp.status, data };
  } catch (e) {
    return { ok: false, error: e.message || String(e) };
  }
}

function callGithub(method, path, body) {
  const token = getGhToken();
  if (!token) return Promise.resolve({ ok: false, error: "Token GitHub não configurado" });
  // Fetch direto quando NÃO for file:// (não tem extensão injetada)
  if (location.protocol !== "file:") {
    return callGithubDirect(method, path, token, body);
  }
  // file://: usa a bridge via content-app.js (extensão Chrome)
  return new Promise((resolve) => {
    const reqId = ++_ghReqCounter;
    _ghPending.set(reqId, { resolve });
    window.postMessage({ type: "CAD_GIST_API", reqId, method, path, token, body }, "*");
    setTimeout(() => {
      if (_ghPending.has(reqId)) {
        _ghPending.delete(reqId);
        resolve({ ok: false, error: "Timeout — a extensão respondeu? (recarregue a aba)" });
      }
    }, 20000);
  });
}

function buildGistFiles(cards, deletedIds) {
  const meta = { deletedIds: deletedIds || {}, version: 3, savedAt: nowIso(), totalCards: cards.length };
  const files = { [GIST_META_FILENAME]: { content: JSON.stringify(meta) } };
  const chunks = chunkCards(cards);
  meta.totalParts = chunks.length;
  files[GIST_META_FILENAME] = { content: JSON.stringify(meta) };
  chunks.forEach((arr, i) => {
    files[gistPartName(i + 1)] = { content: JSON.stringify(arr) };
  });
  return files;
}

// Cria novo gist com os dados atuais
async function gistCreate(cards, deletedIds) {
  const body = {
    description: GIST_DESCRIPTION,
    public: false,
    files: buildGistFiles(cards, deletedIds)
  };
  const resp = await callGithub("POST", "/gists", body);
  if (!resp.ok) throw new Error(resp.error || "Falha ao criar gist");
  return resp.data.id;
}

// Busca o gist existente. Suporta formatos:
//  (a) chunked: meta.json + part-NNN.json (NOVO, padrão)
//  (b) legado: caderno-de-erros.json único
async function gistFetch(id) {
  const resp = await callGithub("GET", "/gists/" + encodeURIComponent(id));
  if (!resp.ok) {
    const tkRaw = localStorage.getItem(GH_TOKEN_KEY) || "";
    const tkClean = getGhToken();
    const dbg = ` [build=${APP_BUILD} s=${resp.status} id=${id?.slice(0,6)}.. tkR=${tkRaw.slice(0,8)} tkC=${tkClean.slice(0,8)} via=${location.protocol==='file:'?'ext':'fetch'} msg=${(resp.error||'').slice(0,80)}]`;
    if (resp.status === 404) throw new Error("Gist não encontrado" + dbg);
    if (resp.status === 401) throw new Error("Token inválido ou sem permissão 'gist'" + dbg);
    throw new Error((resp.error || "Falha ao buscar gist") + dbg);
  }
  const files = resp.data?.files || {};

  // (a) formato chunked
  if (files[GIST_META_FILENAME]) {
    let meta = {};
    try { meta = JSON.parse(files[GIST_META_FILENAME].content || "{}"); } catch {}
    const partNames = Object.keys(files).filter(n => n.startsWith(GIST_PART_PREFIX)).sort();
    const allCards = [];
    for (const name of partNames) {
      const f = files[name];
      let raw = f.content || "";
      if (f.truncated && f.raw_url) {
        const rr = await callGithub("GET_RAW", f.raw_url);
        if (!rr.ok) throw new Error(`Falha ao buscar chunk ${name}: ${rr.error}`);
        raw = rr.data;
      }
      try {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) allCards.push(...arr);
      } catch (e) { /* skip chunk inválido */ }
    }
    return {
      cards: allCards,
      deletedIds: (meta.deletedIds && typeof meta.deletedIds === "object") ? meta.deletedIds : {},
      updatedAt: resp.data?.updated_at
    };
  }

  // (b) formato legado
  const file = files[GIST_FILENAME] || Object.values(files)[0];
  if (!file) return { cards: [], deletedIds: {}, updatedAt: resp.data?.updated_at };
  let rawContent = file.content || "";
  if (file.truncated && file.raw_url) {
    const rr = await callGithub("GET_RAW", file.raw_url);
    if (rr.ok) rawContent = rr.data;
    else throw new Error("Gist legado >1MB e raw URL bloqueada por CORS — atualize do PC primeiro pra migrar pro formato chunked.");
  }
  let parsed;
  try { parsed = JSON.parse(rawContent || "{}"); }
  catch { throw new Error("Gist tem conteúdo corrompido (JSON inválido)"); }
  return {
    cards: Array.isArray(parsed.cards) ? parsed.cards : [],
    deletedIds: parsed.deletedIds && typeof parsed.deletedIds === "object" ? parsed.deletedIds : {},
    updatedAt: resp.data?.updated_at
  };
}

// Atualiza o gist com novos dados (sempre escreve em formato chunked + remove legado/parts antigos)
async function gistUpdate(id, cards, deletedIds) {
  const newFiles = buildGistFiles(cards, deletedIds);
  // Marca pra remover: arquivo legado e parts antigos que não existem mais
  const cur = await callGithub("GET", "/gists/" + encodeURIComponent(id));
  if (cur.ok) {
    const curFiles = cur.data?.files || {};
    for (const name of Object.keys(curFiles)) {
      if (name === GIST_FILENAME) {
        newFiles[name] = null; // remove legado
      } else if (name.startsWith(GIST_PART_PREFIX) && !(name in newFiles)) {
        newFiles[name] = null; // remove parts órfãos
      }
    }
  }
  const resp = await callGithub("PATCH", "/gists/" + encodeURIComponent(id), { files: newFiles });
  if (!resp.ok) throw new Error(resp.error || "Falha ao atualizar gist");
  return true;
}

// Garante que o repo existe; cria se não existir (privado)
async function ensureRepo(repo) {
  const r = await callGithub("GET", `/repos/${repo}`);
  if (r.ok) return true;
  if (r.status !== 404) throw new Error("Falha ao verificar repo: " + (r.error || r.status));
  const [owner, name] = repo.split("/");
  if (!owner || !name) throw new Error("Repo deve ser no formato owner/nome");
  const me = await callGithub("GET", "/user");
  if (!me.ok) throw new Error("Falha pra identificar usuário");
  if (me.data.login.toLowerCase() !== owner.toLowerCase())
    throw new Error("Você só pode criar repos no seu próprio usuário (" + me.data.login + ")");
  const create = await callGithub("POST", "/user/repos", {
    name, private: true,
    description: "Caderno de Erros — dados (auto)",
    auto_init: true
  });
  if (!create.ok) throw new Error("Falha ao criar repo: " + (create.error || create.status));
  return true;
}

// Lista arquivos em data/ e retorna { name → sha }
async function repoListData(repo) {
  const r = await callGithub("GET", `/repos/${repo}/contents/${DATA_DIR}`);
  if (r.status === 404) return {};
  if (!r.ok) throw new Error("Falha ao listar " + DATA_DIR + "/: " + (r.error || r.status));
  const out = {};
  for (const f of (r.data || [])) {
    if (f.type === "file") out[f.name] = f.sha;
  }
  return out;
}

// Lê um arquivo específico via Contents API (até 1MB inline)
async function repoGetFile(repo, name) {
  const r = await callGithub("GET", `/repos/${repo}/contents/${DATA_DIR}/${name}`);
  if (!r.ok) throw new Error("Falha ao ler " + name + ": " + (r.error || r.status));
  // Contents API retorna encoding "none" pra arquivos > 1MB. Cai pra Git Data API blob.
  if (r.data.encoding !== "base64") {
    console.log("[CAD] " + name + " > 1MB, lendo via Git Data API blob");
    const blobResp = await callGithub("GET", `/repos/${repo}/git/blobs/${r.data.sha}`);
    if (!blobResp.ok) throw new Error("Falha ao ler blob " + name + ": " + (blobResp.error || blobResp.status));
    if (blobResp.data.encoding !== "base64") throw new Error("Encoding inesperado em blob " + name);
    return { sha: r.data.sha, content: b64decode(blobResp.data.content) };
  }
  return { sha: r.data.sha, content: b64decode(r.data.content) };
}

// Cria/atualiza arquivo via PUT — com retry em SHA conflict (GitHub usa 409 OU 422
// dependendo do caso; também pega mensagem "is at X but expected Y"). Faz até 3 tentativas.
async function repoPutFile(repo, name, content, sha, attempt) {
  attempt = attempt || 0;
  const body = {
    message: `update ${name}`,
    content: b64encode(content),
  };
  if (sha) body.sha = sha;
  const r = await callGithub("PUT", `/repos/${repo}/contents/${DATA_DIR}/${name}`, body);
  if (r.ok) return r.data?.content?.sha;
  const errMsg = String(r.error || "");
  const isShaConflict = r.status === 409 || r.status === 422 || /is at [a-f0-9]+ but expected/.test(errMsg);
  if (isShaConflict && attempt < 3) {
    console.log(`[CAD] sync conflict em ${name} (status ${r.status}, attempt ${attempt+1}), refetch SHA e retry…`);
    await new Promise(res => setTimeout(res, 100 * Math.pow(4, attempt)));
    const fresh = await callGithub("GET", `/repos/${repo}/contents/${DATA_DIR}/${name}`);
    const freshSha = fresh.ok ? fresh.data?.sha : undefined;
    return repoPutFile(repo, name, content, freshSha, attempt + 1);
  }
  throw new Error("Falha ao salvar " + name + ": " + (errMsg || r.status));
}

// Remove arquivo via DELETE — com retry em SHA conflict (409 OU 422)
async function repoDeleteFile(repo, name, sha, attempt) {
  attempt = attempt || 0;
  const r = await callGithub("DELETE", `/repos/${repo}/contents/${DATA_DIR}/${name}`, {
    message: `remove ${name}`, sha
  });
  if (r.ok) return true;
  const errMsg = String(r.error || "");
  const isShaConflict = r.status === 409 || r.status === 422 || /is at [a-f0-9]+ but expected/.test(errMsg);
  if (isShaConflict && attempt < 3) {
    await new Promise(res => setTimeout(res, 100 * Math.pow(4, attempt)));
    const fresh = await callGithub("GET", `/repos/${repo}/contents/${DATA_DIR}/${name}`);
    if (fresh.ok && fresh.data?.sha) return repoDeleteFile(repo, name, fresh.data.sha, attempt + 1);
    if (fresh.status === 404) return true; // já deletado
  }
  return false;
}

// Pull: baixa todos os parts e monta cards
async function repoFetch(repo) {
  const fileShas = await repoListData(repo);
  const names = Object.keys(fileShas);
  if (names.length === 0) return { cards: [], deletedIds: {}, fileShas };
  let meta = {};
  if (fileShas[META_FILENAME_REPO]) {
    try { meta = JSON.parse((await repoGetFile(repo, META_FILENAME_REPO)).content); } catch {}
  }
  const partNames = names.filter(n => n.startsWith(PART_PREFIX_REPO)).sort();
  const allCards = [];
  for (const name of partNames) {
    const f = await repoGetFile(repo, name);
    try {
      const arr = JSON.parse(f.content);
      if (Array.isArray(arr)) allCards.push(...arr);
    } catch (e) { console.warn("[CAD] chunk inválido:", name, e); }
  }
  return {
    cards: allCards,
    deletedIds: (meta.deletedIds && typeof meta.deletedIds === "object") ? meta.deletedIds : {},
    fileShas
  };
}

// Lê só o SHA do commit HEAD (chamada leve). Detecta se outro device pushou.
async function repoHeadSha(repo) {
  try {
    const repoInfo = await callGithub("GET", `/repos/${repo}`);
    const branch = repoInfo.ok ? (repoInfo.data?.default_branch || "main") : "main";
    const refResp = await callGithub("GET", `/repos/${repo}/git/ref/heads/${branch}?_t=${Date.now()}`);
    if (refResp.ok) return refResp.data?.object?.sha || null;
  } catch (_) {}
  return null;
}

// Push ATÔMICO via Git Data API: meta + parts + remoção de órfãos em UM commit só.
// Se o ref final colidir (outro device pushou no meio), refaz do zero até 3x.
// Fallback pro caminho legado (Contents API multi-PUT) se o repo não tiver commits ainda.
async function repoUpdate(repo, cards, deletedIds) {
  const chunks = chunkCardsBytes(cards, REPO_PART_BYTES);
  const partName = (i) => `${PART_PREFIX_REPO}${String(i + 1).padStart(3, "0")}.json`;
  const meta = {
    deletedIds: deletedIds || {},
    version: 4,
    savedAt: nowIso(),
    totalCards: cards.length,
    totalParts: chunks.length
  };
  const files = [
    { path: `${DATA_DIR}/${META_FILENAME_REPO}`, content: JSON.stringify(meta) },
    ...chunks.map((c, i) => ({ path: `${DATA_DIR}/${partName(i)}`, content: JSON.stringify(c) }))
  ];
  const wantedPaths = new Set(files.map(f => f.path));

  // Descobre branch padrão
  const repoInfo = await callGithub("GET", `/repos/${repo}`);
  if (!repoInfo.ok) throw new Error("Falha ao ler repo: " + (repoInfo.error || repoInfo.status));
  const branch = repoInfo.data?.default_branch || "main";

  for (let attempt = 0; attempt < 3; attempt++) {
    // 1. HEAD da branch (cache-buster pra evitar resposta cacheada do Chrome em retry)
    const refResp = await callGithub("GET", `/repos/${repo}/git/ref/heads/${branch}?_t=${Date.now()}`);
    if (!refResp.ok) {
      if (refResp.status === 404 || refResp.status === 409) {
        // Repo vazio — cai pro legado, que cria os arquivos via Contents API
        return await repoUpdateLegacy(repo, cards, deletedIds);
      }
      throw new Error("Falha ao ler ref: " + (refResp.error || refResp.status));
    }
    const baseCommitSha = refResp.data.object.sha;

    // 2. Tree atual (pra descobrir órfãos sob data/)
    const commitResp = await callGithub("GET", `/repos/${repo}/git/commits/${baseCommitSha}`);
    if (!commitResp.ok) throw new Error("Falha ao ler commit: " + (commitResp.error || commitResp.status));
    const baseTreeSha = commitResp.data.tree.sha;

    const treeResp = await callGithub("GET", `/repos/${repo}/git/trees/${baseTreeSha}?recursive=1`);
    if (!treeResp.ok) throw new Error("Falha ao ler tree: " + (treeResp.error || treeResp.status));
    const existingShas = new Map();
    for (const t of (treeResp.data.tree || [])) {
      if (t.type === "blob") existingShas.set(t.path, t.sha);
    }
    const orphanPaths = [...existingShas.keys()]
      .filter(p => p.startsWith(`${DATA_DIR}/${PART_PREFIX_REPO}`) && !wantedPaths.has(p));

    // 3. DIFF: calcula SHA git-blob de cada file localmente, compara com tree atual.
    // Só faz POST nos files que MUDARAM. 26→2 POSTs em uma sessão típica.
    const filesWithSha = await Promise.all(files.map(async f => ({
      ...f,
      computedSha: await _gitBlobSha(f.content)
    })));
    const filesToUpload = [];
    const reusedBlobs = [];
    for (const f of filesWithSha) {
      if (existingShas.get(f.path) === f.computedSha) {
        reusedBlobs.push({ path: f.path, sha: f.computedSha });
      } else {
        filesToUpload.push(f);
      }
    }
    console.log(`[CAD] diff push: ${filesToUpload.length} mudados, ${reusedBlobs.length} reusados (de ${files.length})`);

    // 4. Cria blobs em paralelo — cada um com retry individual (3 tentativas com backoff).
    const createBlobWithRetry = async (f) => {
      const maxBlobAttempts = 3;
      for (let blobAttempt = 0; blobAttempt < maxBlobAttempts; blobAttempt++) {
        try {
          const r = await callGithub("POST", `/repos/${repo}/git/blobs`, {
            content: b64encode(f.content),
            encoding: "base64"
          });
          if (r.ok) return { path: f.path, sha: r.data.sha };
          const errMsg = String(r.error || "");
          const transient = !r.status || r.status === 502 || r.status === 503 || r.status === 504 || /failed to fetch|network/i.test(errMsg);
          if (transient && blobAttempt < maxBlobAttempts - 1) {
            await new Promise(res => setTimeout(res, 300 * Math.pow(2, blobAttempt)));
            continue;
          }
          throw new Error(`Falha ao criar blob ${f.path}: ${errMsg || r.status}`);
        } catch (e) {
          const isFetchError = /failed to fetch|network/i.test(e.message || "");
          if (isFetchError && blobAttempt < maxBlobAttempts - 1) {
            await new Promise(res => setTimeout(res, 300 * Math.pow(2, blobAttempt)));
            continue;
          }
          throw e;
        }
      }
      throw new Error(`Falha ao criar blob ${f.path} após 3 tentativas`);
    };
    // Pool com paralelismo limitado (3 simultâneos) — resolve falhas em redes
    // ruins (4G/tethering): operadora abate metade de POSTs paralelos com
    // payloads grandes por carrier NAT/MTU/inspeção.
    const PARALLEL_BLOBS = 3;
    const uploadedBlobs = new Array(filesToUpload.length);
    let nextIdx = 0;
    async function worker() {
      while (true) {
        const i = nextIdx++;
        if (i >= filesToUpload.length) return;
        uploadedBlobs[i] = await createBlobWithRetry(filesToUpload[i]);
      }
    }
    await Promise.all(Array.from({ length: Math.min(PARALLEL_BLOBS, filesToUpload.length) }, () => worker()));

    const blobs = [...reusedBlobs, ...uploadedBlobs];

    // 5. Nova tree (mantém o que já existe via base_tree; sha:null deleta)
    const treeEntries = [
      ...blobs.map(b => ({ path: b.path, mode: "100644", type: "blob", sha: b.sha })),
      ...orphanPaths.map(p => ({ path: p, mode: "100644", type: "blob", sha: null }))
    ];
    const newTreeResp = await callGithub("POST", `/repos/${repo}/git/trees`, {
      base_tree: baseTreeSha,
      tree: treeEntries
    });
    if (!newTreeResp.ok) throw new Error(`Falha ao criar tree: ${newTreeResp.error || newTreeResp.status}`);

    // 5. Novo commit
    const stamp = new Date().toISOString().replace("T", " ").slice(0, 16);
    const newCommitResp = await callGithub("POST", `/repos/${repo}/git/commits`, {
      message: `sync ${cards.length} cards @ ${stamp}`,
      tree: newTreeResp.data.sha,
      parents: [baseCommitSha]
    });
    if (!newCommitResp.ok) throw new Error(`Falha ao criar commit: ${newCommitResp.error || newCommitResp.status}`);

    // 6. Move o ref — etapa atômica. Se outro device pushou, GitHub rejeita.
    const updateRefResp = await callGithub("PATCH", `/repos/${repo}/git/refs/heads/${branch}`, {
      sha: newCommitResp.data.sha,
      force: false
    });
    if (updateRefResp.ok) return newCommitResp.data.sha;

    const errMsg = String(updateRefResp.error || "");
    const conflict = updateRefResp.status === 422 || /fast.forward|update.is.at|not.a.fast.forward/i.test(errMsg);
    if (conflict && attempt < 2) {
      console.log(`[CAD] ref conflict (attempt ${attempt+1}/3), retry…`);
      await new Promise(r => setTimeout(r, 200 * Math.pow(2, attempt)));
      continue;
    }
    throw new Error(`Falha ao atualizar ref: ${errMsg || updateRefResp.status}`);
  }
  throw new Error("Sync falhou após 3 tentativas (repo concorrido demais?)");
}

// Fallback antigo (multi-PUT na Contents API) — usado quando o repo ainda não tem commits.
async function repoUpdateLegacy(repo, cards, deletedIds) {
  const existing = await repoListData(repo);
  const chunks = chunkCardsBytes(cards, REPO_PART_BYTES);
  const partName = (i) => `${PART_PREFIX_REPO}${String(i + 1).padStart(3, "0")}.json`;
  const newNames = new Set([META_FILENAME_REPO, ...chunks.map((_, i) => partName(i))]);
  const meta = {
    deletedIds: deletedIds || {},
    version: 4,
    savedAt: nowIso(),
    totalCards: cards.length,
    totalParts: chunks.length
  };
  await repoPutFile(repo, META_FILENAME_REPO, JSON.stringify(meta), existing[META_FILENAME_REPO]);
  for (let i = 0; i < chunks.length; i++) {
    const name = partName(i);
    await repoPutFile(repo, name, JSON.stringify(chunks[i]), existing[name]);
  }
  for (const [name, sha] of Object.entries(existing)) {
    if (!newNames.has(name) && name.startsWith(PART_PREFIX_REPO)) {
      await repoDeleteFile(repo, name, sha);
    }
  }
  return true;
}

// Mescla dois conjuntos (local + remoto) respeitando updatedAt e deletedIds
// Une dois históricos por `ts` (nunca perde entries, mesmo em ping-pong sync)
function mergeHistorico(a, b) {
  const map = new Map();
  for (const h of (a || [])) if (h && h.ts) map.set(h.ts, h);
  for (const h of (b || [])) if (h && h.ts && !map.has(h.ts)) map.set(h.ts, h);
  return [...map.values()].sort((x, y) => (x.ts || "").localeCompare(y.ts || ""));
}

function mergeData(local, remote) {
  const map = new Map(); // id → card
  for (const c of local.cards || []) map.set(c.id, c);
  for (const c of remote.cards || []) {
    const cur = map.get(c.id);
    if (!cur) { map.set(c.id, c); continue; }
    const a = cur.updatedAt || cur.createdAt || "";
    const b = c.updatedAt || c.createdAt || "";
    // Histórico SEMPRE é união (audit trail — nunca se perde, mesmo se sync sobrescrever SM-2)
    const historico = mergeHistorico(cur.historico, c.historico);
    if (b > a) map.set(c.id, { ...c, historico });
    else map.set(c.id, { ...cur, historico });
  }
  const deletedIds = { ...(local.deletedIds || {}), ...(remote.deletedIds || {}) };
  // Pra cada id, mantém timestamp mais recente
  for (const k of Object.keys(deletedIds)) {
    const l = local.deletedIds?.[k] || "";
    const r = remote.deletedIds?.[k] || "";
    deletedIds[k] = l > r ? l : r;
  }
  // Remove cards que foram deletados depois do seu próprio updatedAt
  const merged = [];
  for (const c of map.values()) {
    const delTs = deletedIds[c.id];
    const cardTs = c.updatedAt || c.createdAt || "";
    if (delTs && delTs >= cardTs) continue; // deleção venceu
    merged.push(c);
  }
  return { cards: merged, deletedIds };
}

async function callAnthropic(body) {
  const key = getApiKey();
  if (!key) throw new Error("API KEY não configurada. Clique em Configurações.");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API erro ${resp.status}: ${errText.slice(0,200)}`);
  }
  return resp.json();
}

function exportBackup(cards) {
  const data = { cards, exportedAt: new Date().toISOString(), version: 2 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `caderno-erros-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const stripHtml = s => (s||"").replace(/<[^>]+>/g,"");

// Renderiza frente/verso de cards: respeita HTML existente, decodifica entities (&gt;, &lt; etc) e converte markdown.
function renderCardText(s) {
  if (!s) return "";
  const hasHtml = /<\w+[^>]*>/.test(s);
  let out = s;
  if (!hasHtml) {
    // 1) Decodifica entities que possam ter vindo pré-escapadas em saves antigos ou da IA
    out = out
      .replace(/&gt;/g, ">").replace(/&lt;/g, "<")
      .replace(/&quot;/g, '"').replace(/&#39;/g, "'")
      .replace(/&nbsp;/g, " ").replace(/&amp;/g, "&");
    // 2) Re-escapa caracteres especiais (segurança contra HTML inesperado)
    out = out.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  // 3) Markdown
  out = out
    .replace(/\*\*([^*\n][^*]*?)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*\w])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>")
    .replace(/`([^`\n]+)`/g, '<code style="background:#1d2a26;padding:1px 5px;border-radius:3px;font-family:ui-monospace,monospace;font-size:0.9em;">$1</code>');
  if (!hasHtml) out = out.replace(/\n/g, "<br>");
  return out;
}

// Parser ROBUSTO da sugestão de flashcard da IA (tolera markdown, maiúsc/minúsc,
// sem marcadores). Retorna {frente, verso} ou null.
function parseFlashcardSuggestion(reply) {
  if (!reply) return null;
  const bloco = reply.match(/---\s*FLASHCARD\s*---([\s\S]*?)(?:---\s*FIM\s*---|$)/i);
  const src = bloco ? bloco[1] : reply;
  const fM = src.match(/\**\s*frente\s*\**\s*[:\-–]\s*([\s\S]+?)(?=\n?\s*\**\s*verso\s*\**\s*[:\-–])/i);
  const vM = src.match(/\**\s*verso\s*\**\s*[:\-–]\s*([\s\S]+?)(?=\n?\s*---\s*FIM|$)/i);
  if (!fM || !vM) return null;
  const limpa = s => s.replace(/\*\*/g, "").replace(/^\s*[-•*]\s*/, "").trim();
  const frente = limpa(fM[1]), verso = limpa(vM[1]);
  if (!frente || !verso) return null;
  return { frente, verso };
}
function stripFlashcardBlock(text) {
  return String(text || "").replace(/---\s*FLASHCARD\s*---[\s\S]*?(?:---\s*FIM\s*---|$)/i, "").trim();
}

// Renderer de Markdown leve para mensagens do tutor.
// Suporta: **bold**, *italic*, `code`, headers #/##/###, listas (- *) e numeradas, tabelas | a | b |, links, quebras.
function renderMd(text) {
  if (!text) return "";
  text = stripFlashcardBlock(text);
  let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  // Code blocks ``` ```
  html = html.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre style="background:${COZY.bg};border:1px solid ${COZY.lineSoft};border-radius:6px;padding:8px 10px;margin:6px 0;overflow-x:auto;font-family:${COZY.fontMono};font-size:11px;line-height:1.5;">${code.trim()}</pre>`);

  // Tabelas markdown
  html = html.replace(/((?:^\s*\|[^\n]*\|\s*\n)+)/gm, (match) => {
    const lines = match.trim().split("\n").map(l => l.trim());
    if (lines.length < 2) return match;
    const isSep = (l) => /^\|[\s\-:|]+\|$/.test(l);
    let head = "", body = "", i = 0;
    if (isSep(lines[1] || "")) {
      const cells = lines[0].split("|").slice(1, -1).map(c => c.trim());
      head = `<thead><tr>${cells.map(c => `<th style="border:1px solid ${COZY.line};padding:5px 9px;background:${COZY.bg2};text-align:left;font-weight:600;font-size:11px;">${c}</th>`).join("")}</tr></thead>`;
      i = 2;
    }
    body = "<tbody>";
    for (; i < lines.length; i++) {
      if (isSep(lines[i])) continue;
      const cells = lines[i].split("|").slice(1, -1).map(c => c.trim());
      body += `<tr>${cells.map(c => `<td style="border:1px solid ${COZY.line};padding:5px 9px;font-size:12px;">${c}</td>`).join("")}</tr>`;
    }
    body += "</tbody>";
    return `<table style="border-collapse:collapse;margin:8px 0;width:100%;">${head}${body}</table>`;
  });

  // Headers
  html = html.replace(/^####\s+(.+)$/gm, `<div style="font-weight:700;font-size:12px;margin:8px 0 3px;color:${COZY.peach};">$1</div>`);
  html = html.replace(/^###\s+(.+)$/gm, `<div style="font-weight:700;font-size:13px;margin:10px 0 4px;color:${COZY.peach};">$1</div>`);
  html = html.replace(/^##\s+(.+)$/gm, `<div style="font-weight:700;font-size:14px;margin:12px 0 5px;color:${COZY.peach};">$1</div>`);
  html = html.replace(/^#\s+(.+)$/gm, `<div style="font-weight:700;font-size:15px;margin:14px 0 6px;color:${COZY.peach};">$1</div>`);

  // Listas bullet (- ou *)
  html = html.replace(/((?:^[\-\*]\s+.+(?:\n|$))+)/gm, (m) => {
    const items = m.trim().split("\n").map(l => l.replace(/^[\-\*]\s+/, ""));
    return `<ul style="margin:5px 0;padding-left:20px;">${items.map(it => `<li style="margin-bottom:3px;">${it}</li>`).join("")}</ul>`;
  });
  // Listas numeradas
  html = html.replace(/((?:^\d+\.\s+.+(?:\n|$))+)/gm, (m) => {
    const items = m.trim().split("\n").map(l => l.replace(/^\d+\.\s+/, ""));
    return `<ol style="margin:5px 0;padding-left:24px;">${items.map(it => `<li style="margin-bottom:3px;">${it}</li>`).join("")}</ol>`;
  });

  // Inline: bold, italic, code, links
  html = html.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
  html = html.replace(/`([^`\n]+)`/g, `<code style="background:${COZY.bg};padding:1px 5px;border-radius:3px;font-family:${COZY.fontMono};font-size:0.9em;">$1</code>`);
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, `<a href="$2" target="_blank" style="color:${COZY.peach};text-decoration:underline;">$1</a>`);

  // Quebras de linha
  html = html.replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br>");
  // Limpa <br> em volta de blocos
  html = html.replace(/<br>(<(?:table|ul|ol|div|pre|h\d))/g, "$1");
  html = html.replace(/(<\/(?:table|ul|ol|div|pre|h\d)>)<br>/g, "$1");
  return html;
}

function syncBadge(state, configured) {
  if (!configured) return { icon: "○", label: "sem sync", title: "Configure a sync nas Configurações" };
  if (state.status === "syncing") return { icon: "⟳", label: "sincronizando…", title: "Sincronizando com GitHub Gist" };
  if (state.status === "error") return { icon: "⚠", label: "erro", title: "Erro: " + (state.error || "desconhecido") };
  if (state.status === "ok" || state.lastSync) {
    const d = new Date(state.lastSync);
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return { icon: "☁", label: `${hh}:${mm}`, title: `Sincronizado às ${hh}:${mm}` };
  }
  return { icon: "○", label: "aguardando", title: "Aguardando primeira sync" };
}

function RichEditor({value, onChange, placeholder, minHeight=80}) {
  const editorRef = useRef();
  const fileRef = useRef();
  useEffect(() => {
    const el = editorRef.current;
    if (el && el.innerHTML !== (value?.html || "")) el.innerHTML = value?.html || "";
  }, []);
  // Re-sync se value.html mudar externamente (ex: sugestão da IA via "Aplicar")
  useEffect(() => {
    const el = editorRef.current;
    if (!el) return;
    if (document.activeElement === el) return;
    if (el.innerHTML !== (value?.html || "")) el.innerHTML = value?.html || "";
  }, [value?.html]);
  const execCmd = (cmd, arg=null) => { editorRef.current?.focus(); document.execCommand(cmd, false, arg); sync(); };
  const sync = () => { const h = editorRef.current?.innerHTML || ""; onChange({...(value||{}), html: h}); };
  const imgsAtuais = () => (value?.imgs || (value?.img ? [value.img] : []));
  const addImgs = (dataUrls) => onChange({ ...(value||{}), imgs: [...imgsAtuais(), ...dataUrls], img: undefined });
  const removeImgAt = (idx) => onChange({ ...(value||{}), imgs: imgsAtuais().filter((_, i) => i !== idx), img: undefined });
  function handlePaste(e) {
    const items = e.clipboardData?.items; if (!items) return;
    const imgItems = [...items].filter(it => it.type.startsWith("image/"));
    if (imgItems.length > 0) {
      e.preventDefault();
      Promise.all(imgItems.map(it => resizeImageToDataUrl(it.getAsFile()))).then(addImgs);
      return;
    }
    e.preventDefault();
    document.execCommand("insertText", false, e.clipboardData.getData("text/plain"));
    sync();
  }
  function handleFile(e) {
    const files = [...e.target.files]; if (!files.length) return;
    Promise.all(files.map(f => resizeImageToDataUrl(f))).then(addImgs);
    e.target.value = "";
  }
  const bS = () => ({background:"#3d5048",border:"none",color:"#f0e6d2",borderRadius:6,padding:"3px 9px",cursor:"pointer",fontSize:12,fontWeight:500,lineHeight:"18px"});
  return (
    <div style={{border:"1px solid #3d5048",borderRadius:8,background:"#243530",overflow:"hidden"}}>
      <div style={{display:"flex",gap:5,padding:"6px 8px",borderBottom:"1px solid #324239",flexWrap:"wrap",alignItems:"center"}}>
        <button style={bS()} onMouseDown={e => {e.preventDefault(); execCmd("bold");}}><b>N</b></button>
        <button style={{...bS(),background:"#7c6a00",color:"#ffe066"}} onMouseDown={e => {e.preventDefault(); execCmd("hiliteColor","#ffe066");}}>▐ mk</button>
        <button style={{...bS(),fontSize:11,color:"#c9bfa6"}} onMouseDown={e => {e.preventDefault(); execCmd("removeFormat");}}>✕ fmt</button>
        <div style={{width:1,height:16,background:"#3d5048",margin:"0 2px"}}/>
        <button style={{...bS(),fontSize:11}} onMouseDown={e => {e.preventDefault(); fileRef.current.click();}}>📎 img</button>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFile}/>
      </div>
      <div ref={editorRef} contentEditable suppressContentEditableWarning onInput={sync} onPaste={handlePaste} data-placeholder={placeholder}
        style={{minHeight, padding:"9px 12px", color:"#f0e6d2", fontSize:14, outline:"none", lineHeight:1.6, wordBreak:"break-word", fontFamily:"system-ui,sans-serif", fontWeight:400}}/>
      {imgsAtuais().length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:8,padding:"0 10px 10px"}}>
          {imgsAtuais().map((src, i) => (
            <div key={i} style={{position:"relative"}}>
              <img src={src} style={{maxWidth:"100%",maxHeight:200,borderRadius:6,display:"block"}} alt={`anexo ${i+1}`}/>
              <button title="Remover imagem" style={{position:"absolute",top:4,right:4,background:"#d9a3a3",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={() => removeImgAt(i)}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ComentarioSection({form, setForm}) {
  const fileRef = useRef();
  async function addImg(f) {
    const dataUrl = await resizeImageToDataUrl(f);
    setForm(fr => ({...fr, comentarioImgs: [...(fr.comentarioImgs||[]), dataUrl]}));
  }
  function handleFile(e) { Array.from(e.target.files).forEach(addImg); e.target.value = ""; }
  function handlePaste(e) {
    const items = e.clipboardData?.items; if (!items) return;
    for (const item of items) {
      if (item.type.startsWith("image/")) { e.preventDefault(); addImg(item.getAsFile()); return; }
    }
  }
  function removeImg(i) { setForm(f => ({...f, comentarioImgs: (f.comentarioImgs||[]).filter((_,idx) => idx !== i)})); }
  const imgs = form.comentarioImgs || [];
  return (
    <div id="comentario-section" style={{marginBottom:14}}>
      <label style={{...S.lbl, marginBottom:6}}>💬 Comentário do professor <span style={{color:"#5e6f66",fontWeight:400}}>(opcional — melhora o flashcard)</span></label>
      <textarea style={{...S.inp, minHeight:60, resize:"vertical", marginBottom:8}} placeholder="Cole ou digite o comentário…" value={form.comentario||""} onChange={e => setForm(f => ({...f, comentario: e.target.value}))} onPaste={handlePaste}/>
      {imgs.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
          {imgs.map((src, i) => (
            <div key={i} style={{position:"relative",display:"inline-block"}}>
              <img src={src} style={{height:72,borderRadius:6,border:"1px solid #3d5048",display:"block"}} alt={`c-${i}`}/>
              <button onClick={() => removeImg(i)} style={{position:"absolute",top:-6,right:-6,background:"#d9a3a3",border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
            </div>
          ))}
        </div>
      )}
      <button onClick={() => fileRef.current.click()} style={{...S.btn(), fontSize:12, padding:"5px 12px"}}>📎 {imgs.length > 0 ? "Adicionar mais" : "Print do comentário"}</button>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFile}/>
      <p style={{fontSize:11,color:"#5e6f66",margin:"4px 0 0"}}>ou cole com Ctrl+V na área de texto</p>
    </div>
  );
}

function ConfigModal({onClose, cards, setCards, showToast, deletedIds, setDeletedIds, syncState, setSyncState}) {
  const [key, setKey] = useState(getApiKey());
  const [showKey, setShowKey] = useState(false);
  const [ghToken, setGhTokenLocal] = useState(getGhToken());
  const [showGh, setShowGh] = useState(false);
  const [gistId, setGistIdLocal] = useState(getGistId());
  const [repo, setRepoLocal] = useState(getRepo());
  const [syncBusy, setSyncBusy] = useState(false);
  const [dailyLimit, setDailyLimitLocal] = useState(getDailyLimit());
  const importRef = useRef();

  function handleSaveKey() {
    saveApiKey(key.trim());
    showToast("Chave salva!");
  }

  function handleSaveGh() {
    saveGhToken(ghToken);
    saveGistId(gistId);
    showToast("Credenciais salvas!");
  }

  async function handleCreateGist() {
    if (!ghToken.trim()) { alert("Cole o Personal Access Token primeiro."); return; }
    saveGhToken(ghToken);
    setSyncBusy(true);
    setSyncState(s => ({ ...s, status: "syncing", error: "" }));
    try {
      const id = await gistCreate(cards, deletedIds || {});
      saveGistId(id);
      setGistIdLocal(id);
      const ts = nowIso();
      saveLastSync(ts);
      setSyncState({ status: "ok", error: "", lastSync: ts });
      showToast("Gist criado! ID: " + id.slice(0, 8) + "…");
    } catch (e) {
      setSyncState({ status: "error", error: e.message, lastSync: getLastSync() });
      alert("Falha ao criar gist: " + e.message);
    }
    setSyncBusy(false);
  }

  async function handleConnectGist() {
    if (!ghToken.trim() || !gistId.trim()) { alert("Cole o token E o ID do gist."); return; }
    saveGhToken(ghToken);
    saveGistId(gistId);
    setSyncBusy(true);
    setSyncState(s => ({ ...s, status: "syncing", error: "" }));
    try {
      const remote = await gistFetch(gistId.trim());
      const local = { cards, deletedIds: deletedIds || {} };
      const merged = mergeData(local, remote);
      setCards(merged.cards);
      setDeletedIds(merged.deletedIds);
      // Push de volta a versão mesclada
      await gistUpdate(gistId.trim(), merged.cards, merged.deletedIds);
      const ts = nowIso();
      saveLastSync(ts);
      setSyncState({ status: "ok", error: "", lastSync: ts });
      showToast(`Conectado! ${merged.cards.length} cards no total.`);
    } catch (e) {
      setSyncState({ status: "error", error: e.message, lastSync: getLastSync() });
      alert("Falha ao conectar: " + e.message);
    }
    setSyncBusy(false);
  }

  async function handleSyncNow() {
    if (!getGhToken()) { alert("Configure o GitHub Token primeiro."); return; }
    if (!getRepo() && !getGistId()) { alert("Configure o repositório de dados (recomendado) ou um Gist ID."); return; }
    setSyncBusy(true);
    setSyncState(s => ({ ...s, status: "syncing", error: "" }));
    try {
      let remote;
      if (getRepo()) {
        remote = await repoFetch(getRepo());
      } else {
        remote = await gistFetch(getGistId());
      }
      const local = { cards, deletedIds: deletedIds || {} };
      const merged = mergeData(local, remote);
      setCards(merged.cards);
      setDeletedIds(merged.deletedIds);
      if (getRepo()) {
        await repoUpdate(getRepo(), merged.cards, merged.deletedIds);
      } else {
        await gistUpdate(getGistId(), merged.cards, merged.deletedIds);
      }
      const ts = nowIso();
      saveLastSync(ts);
      setSyncState({ status: "ok", error: "", lastSync: ts });
      showToast("Sincronizado!");
    } catch (e) {
      setSyncState({ status: "error", error: e.message, lastSync: getLastSync() });
      alert("Falha na sync: " + e.message);
    }
    setSyncBusy(false);
  }

  // Configura repo e migra dados (do gist ou local) pra Contents API
  async function handleConfigureRepo() {
    const r = (repo || "").trim();
    if (!r.includes("/")) { alert('Use o formato "owner/repo" (ex: "estevaodocvanzo/caderno-data").'); return; }
    if (!getGhToken()) { alert("Configure o GitHub Token primeiro (com escopo 'repo')."); return; }
    setSyncBusy(true);
    setSyncState(s => ({ ...s, status: "syncing", error: "" }));
    try {
      await ensureRepo(r);
      // Tenta puxar dados existentes do repo (se já configurado antes)
      let remote = { cards: [], deletedIds: {}, fileShas: {} };
      try { remote = await repoFetch(r); } catch (e) { /* repo vazio, ignora */ }
      // Se repo vazio E tem gist configurado, migra dados do gist
      if (remote.cards.length === 0 && getGistId()) {
        try {
          const fromGist = await gistFetch(getGistId());
          remote = { cards: fromGist.cards, deletedIds: fromGist.deletedIds };
          showToast(`Migrando ${fromGist.cards.length} cards do gist…`);
        } catch (e) { /* sem gist, ignora */ }
      }
      const local = { cards, deletedIds: deletedIds || {} };
      const merged = mergeData(local, remote);
      setCards(merged.cards);
      setDeletedIds(merged.deletedIds);
      await repoUpdate(r, merged.cards, merged.deletedIds);
      saveRepo(r);
      const ts = nowIso();
      saveLastSync(ts);
      setSyncState({ status: "ok", error: "", lastSync: ts });
      showToast(`Repo configurado! ${merged.cards.length} cards sincronizados.`);
    } catch (e) {
      setSyncState({ status: "error", error: e.message, lastSync: getLastSync() });
      alert("Falha ao configurar repo: " + e.message);
    }
    setSyncBusy(false);
  }

  function handleDisconnect() {
    if (!confirm("Desconectar esta máquina do gist?\n\nSeus dados locais continuam aqui, mas não vão mais sincronizar. O gist na nuvem permanece intacto.")) return;
    saveGhToken("");
    saveGistId("");
    setGhTokenLocal("");
    setGistIdLocal("");
    setSyncState({ status: "idle", error: "", lastSync: "" });
    showToast("Desconectado.");
  }

  function handleImport(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.cards || !Array.isArray(data.cards)) throw new Error("Arquivo inválido");
        const merge = confirm(`Importar ${data.cards.length} itens?\n\nOK = MESCLAR com os atuais\nCancelar = SUBSTITUIR tudo`);
        if (merge) {
          const existingIds = new Set(cards.map(c => c.id));
          const novos = data.cards.filter(c => !existingIds.has(c.id));
          setCards([...cards, ...novos]);
          showToast(`${novos.length} novos itens importados!`);
        } else {
          setCards(data.cards);
          showToast(`${data.cards.length} itens substituíram a base.`);
        }
      } catch (err) { alert("Erro ao importar: " + err.message); }
    };
    r.readAsText(f);
    e.target.value = "";
  }

  return (
    <div style={{position:"fixed",inset:0,background:"#000a",zIndex:990,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#2c3f38",border:"1px solid #3d5048",borderRadius:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto",padding:20}}>

        <div style={S.card}>

          <p style={{fontSize:12,color:"#8d9890",marginBottom:10,lineHeight:1.5}}>
            Desloca o <strong style={{color:"#e8b69a"}}>calendário inteiro</strong> em N dias. Cards de ontem viram hoje, de hoje viram amanhã, de amanhã vão pra depois — tudo +N. <strong style={{color:"#a8c4a2"}}>Preserva SM-2</strong> (interval/rep/ease intactos).

          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#8d9890"}}>Adiar por</span>

            <span style={{fontSize:12,color:"#8d9890"}}>dia(s)</span>
          </div>
          {(() => {
            const totalFlashcards = cards.filter(c => c.tipo !== "questao").length;
            const t = today();
            const dueHoje = cards.filter(c => c.tipo !== "questao" && c.nextReview <= t).length;
            return (
              <p style={{fontSize:11,color:"#5e6f66",margin:"8px 0 0",fontFamily:"ui-monospace,monospace"}}>
                {totalFlashcards} flashcards no total · {dueHoje} due hoje
              </p>
            );
          })()}
          <button style={{...S.btn(),width:"100%",marginTop:10}} onClick={() => {
            const days = parseInt(document.getElementById("defer-days").value || "1", 10);
            if (!days || days < 1 || days > 60) { showToast("Número de dias inválido (1-60)"); return; }
            const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
            const afetados = cards.filter(c => c.tipo !== "questao" && c.nextReview);
            if (afetados.length === 0) { showToast("Nenhum flashcard pra adiar 🎉"); return; }
            if (!confirm(`Adiar TODOS os ${afetados.length} flashcards em ${days} dia(s)?\n\n✓ Calendário inteiro desloca +${days}d\n✓ SM-2 PRESERVADO (interval/rep/ease intactos)\n✓ Cards atrasados continuam atrasados (deslocados, mas ainda no passado se eram muito antigos)`)) return;
            const todayStr = today();
            setCards(prev => prev.map(c => {
              if (c.tipo === "questao" || !c.nextReview) return c;
              const jaDeferred = (c.historico || []).some(h => h.kind === "defer" && h.data === todayStr && h.dias === days);
              if (jaDeferred) return c;
              const atual = new Date(c.nextReview + "T00:00:00");
              atual.setDate(atual.getDate() + days);
              const novoNextReview = fmtDate(atual);
              const entry = {
                ts: nowIso(), data: todayStr, kind: "defer",
                motivo: `adiar-${days}d-todos`,
                dias: days,
                nextReviewAntes: c.nextReview,
                nextReviewDepois: novoNextReview,
                src: "mobile",
              };
              return {
                ...c,
                nextReview: novoNextReview,
                historico: [...(c.historico || []), entry],
                updatedAt: nowIso(),
              };
            }));
            showToast(`✓ ${afetados.length} flashcards adiados em ${days} dia(s)`);
          }}>🏖️ Adiar todos agora</button>

          {/* DILUIR BACKLOG: espalha cards due em N dias PRESERVANDO SM-2 */}
          {(() => {
            const t = today();
            const dueCards = cards.filter(c => c.tipo !== "questao" && c.nextReview && c.nextReview <= t);
            if (dueCards.length <= 30) return null;
            return (
              <>
                <div style={{height:1,background:"#3d5048",margin:"14px 0"}}/>
                <p style={{fontSize:12,color:"#8d9890",marginBottom:8,lineHeight:1.5}}>
                  <strong style={{color:"#a8c4a2"}}>🌅 Diluir backlog</strong> — <strong>nivela</strong> todos os cards dos próximos N dias (backlog + montes já agendados) numa carga plana. <strong>Preserva SM-2</strong>. Frágeis primeiro; maduros pro fim.
                </p>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
                  <span style={{fontSize:12,color:"#8d9890"}}>Nivelar em</span>
                  <input type="number" min="2" max="60" defaultValue="20" id="diluir-days" style={{width:60,background:"#243530",border:"1px solid #3d5048",color:"#f0e6d2",padding:"6px 8px",borderRadius:6,fontSize:13,fontFamily:"inherit"}}/>
                  <span style={{fontSize:12,color:"#8d9890"}}>dias</span>
                </div>
                <button style={{...S.btn("accent"),width:"100%"}} onClick={() => {
                  const days = parseInt(document.getElementById("diluir-days").value || "20", 10);
                  if (!days || days < 2 || days > 60) { showToast("Número de dias inválido (2-60)"); return; }
                  const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
                  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + (days - 1));
                  const cutoffStr = fmtDate(cutoff);
                  const janela = cards.filter(c => c.tipo !== "questao" && c.nextReview && c.nextReview <= cutoffStr);
                  const porDia = Math.ceil(janela.length / days);
                  if (!confirm(`Nivelar ${janela.length} cards (dos próximos ${days} dias) em ≈ ${porDia}/dia?\n\n✓ SM-2 PRESERVADO\n✓ Carga fica PLANA — hoje, amanhã e depois iguais\n✓ Frágeis primeiro, maduros pro fim\n✓ Cards além de ${days} dias NÃO são tocados\n\nNADA é resetado.`)) return;
                  const ordenados = [...janela].sort((a,b) => {
                    const ia = a.interval||1, ib = b.interval||1;
                    if (ia !== ib) return ia - ib;
                    return (a.repetitions||0) - (b.repetitions||0);
                  });
                  const ids = new Map();
                  ordenados.forEach((c, idx) => {
                    const offset = Math.floor(idx / porDia);
                    const d = new Date(); d.setDate(d.getDate() + offset);
                    ids.set(c.id, fmtDate(d));
                  });
                  const todayStr = today();
                  setCards(prev => prev.map(c => {
                    const novo = ids.get(c.id);
                    if (!novo || novo === c.nextReview) return c;
                    const entry = { ts: nowIso(), data: todayStr, kind: "defer", motivo: `diluir-backlog-${days}d`, nextReviewAntes: c.nextReview, nextReviewDepois: novo, src: "mobile" };
                    return { ...c, nextReview: novo, historico: [...(c.historico || []), entry], updatedAt: nowIso() };
                  }));
                  showToast(`✓ ${janela.length} cards nivelados em ${days} dias (SM-2 preservado)`);
                }}>🌅 Nivelar próximos N dias</button>
              </>
            );
          })()}

          {(() => {
            const t = today();
            const cutoffDate = new Date(); cutoffDate.setDate(cutoffDate.getDate() - 7);
            const cutoffStr = `${cutoffDate.getFullYear()}-${String(cutoffDate.getMonth()+1).padStart(2,"0")}-${String(cutoffDate.getDate()).padStart(2,"0")}`;
            const defersByDate = new Map();
            for (const c of cards) {
              if (c.tipo === "questao") continue;
              for (const h of (c.historico || [])) {
                if (h.kind !== "defer" || !h.data || h.data < cutoffStr || h.data >= t) continue;
                if (!defersByDate.has(h.data)) defersByDate.set(h.data, { dias: h.dias || 1, count: 0 });
                defersByDate.get(h.data).count++;
              }
            }
            if (defersByDate.size === 0) return null;
            const dates = [...defersByDate.keys()].sort();
            const lastDate = dates[dates.length - 1];
            const lastInfo = defersByDate.get(lastDate);
            const semDefer = cards.filter(c => c.tipo !== "questao" && c.nextReview && !(c.historico || []).some(h => h.kind === "defer" && h.data === lastDate));
            if (semDefer.length === 0) return null;
            return (
              <>
                <div style={{height:1,background:"#3d5048",margin:"14px 0"}}/>
                <p style={{fontSize:12,color:"#8d9890",marginBottom:10,lineHeight:1.5}}>
                  <strong style={{color:"#e8d5a3"}}>🩹 Defer recente detectado</strong> em <code style={{background:"#243530",padding:"1px 5px",borderRadius:4,fontSize:11}}>{lastDate}</code> ({lastInfo.count} cards adiados em {lastInfo.dias} dia(s) — Opção A antiga). <strong>{semDefer.length} cards no futuro não foram tocados</strong> e ainda têm o calendário "errado". Aplicar +{lastInfo.dias}d retroativamente neles pra calendário ficar consistente?
                </p>
                <button style={{...S.btn("accent"),width:"100%"}} onClick={() => {
                  if (!confirm(`Aplicar +${lastInfo.dias}d em ${semDefer.length} cards que perderam o defer de ${lastDate}?\n\n✓ Só afeta cards SEM entry de defer naquela data\n✓ Cards já deferred ficam intocados\n✓ Resultado: calendário inteiro fica como se Opção C tivesse sido usada em ${lastDate}`)) return;
                  const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
                  const semDeferIds = new Set(semDefer.map(c => c.id));
                  const todayStr = today();
                  setCards(prev => prev.map(c => {
                    if (!semDeferIds.has(c.id)) return c;
                    const atual = new Date(c.nextReview + "T00:00:00");
                    atual.setDate(atual.getDate() + lastInfo.dias);
                    const novoNextReview = fmtDate(atual);
                    const entry = {
                      ts: nowIso(), data: todayStr, kind: "defer",
                      motivo: `retroativa-correcao-${lastDate}`,
                      dias: lastInfo.dias,
                      nextReviewAntes: c.nextReview,
                      nextReviewDepois: novoNextReview,
                      src: "mobile",
                    };
                    return {
                      ...c,
                      nextReview: novoNextReview,
                      historico: [...(c.historico || []), entry],
                      updatedAt: nowIso(),
                    };
                  }));
                  showToast(`✓ ${semDefer.length} cards corrigidos retroativamente`);
                }}>🩹 Aplicar +{lastInfo.dias}d nos {semDefer.length} cards que faltaram</button>
              </>
            );
          })()}
        </div>

        {(() => {
          const regressed = detectRegressedCards(cards);
          if (regressed.length === 0) return null;
          return (
            <div style={S.card}>
              <p style={{fontWeight:500,fontSize:14,marginBottom:4,color:"#f0e6d2"}}>🔍 Cards regredidos detectados</p>
              <p style={{fontSize:12,color:"#8d9890",marginBottom:10,lineHeight:1.5}}>
                <strong style={{color:"#feb2b2"}}>{regressed.length} cards</strong> têm SM-2 atual <strong>menor</strong> que o último registro do histórico. Sintoma de sync que sobrescreveu o estado correto. O histórico tem a verdade — pode restaurar.
              </p>
              <div style={{maxHeight:280,overflowY:"auto",border:"1px solid #3d5048",borderRadius:6,padding:8,marginBottom:10,background:"#1d2a26"}}>
                {regressed.slice(0, 15).map(({card, currentRep, expectedRep, maxRep}, i) => (
                  <div key={card.id} style={{padding:"6px 8px",borderBottom: i < regressed.slice(0,15).length-1 ? "1px solid #324239" : "none",fontSize:11,fontFamily:"ui-monospace,monospace",color:"#a8bdc4"}}>
                    <div style={{color:"#f0e6d2",marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>
                      {stripHtml(card.frente).slice(0, 60)}{stripHtml(card.frente).length > 60 ? "…" : ""}
                    </div>
                    <span style={{color:"#feb2b2"}}>rep atual: {currentRep}</span>
                    <span style={{color:"#5e6f66"}}> · esperado: <strong style={{color:"#a8c4a2"}}>{expectedRep}</strong></span>
                    <span style={{color:"#5e6f66"}}> · máx histórico: {maxRep}</span>
                  </div>
                ))}
                {regressed.length > 15 && (
                  <div style={{padding:"6px 8px",fontSize:10,color:"#5e6f66",fontFamily:"ui-monospace,monospace",fontStyle:"italic"}}>
                    + {regressed.length - 15} mais (não mostrados)
                  </div>
                )}
              </div>
              <button style={{...S.btn("primary"),width:"100%"}} onClick={() => {
                if (!confirm(`Restaurar ${regressed.length} cards regredidos via replay do histórico?\n\n✓ Lê o último kind:"grade" de cada card\n✓ Restaura interval/rep/ease pros valores registrados\n✓ Define nextReview = hoje + interval (libera espaço)\n✓ Loga entry kind:"restore" no histórico pra auditoria\n✓ Cards com reset depois do último grade são pulados (reset foi intencional)`)) return;
                let restoredCount = 0;
                const restoreMap = new Map();
                for (const { card } of regressed) {
                  const restored = restoreCardFromHistory(card);
                  if (restored) {
                    restoreMap.set(card.id, restored);
                    restoredCount++;
                  }
                }
                if (restoredCount === 0) { showToast("Nenhum card pôde ser restaurado (reset intencional após grade)"); return; }
                const todayStr = today();
                setCards(prev => prev.map(c => {
                  const r = restoreMap.get(c.id);
                  if (!r) return c;
                  const entry = {
                    ts: nowIso(), data: todayStr, kind: "restore",
                    motivo: "regressao-detectada",
                    intAntes: c.interval || 1, intDepois: r.interval,
                    repAntes: c.repetitions || 0, repDepois: r.repetitions,
                    easeAntes: Number((c.easeFactor || 2.5).toFixed(2)),
                    easeDepois: Number(r.easeFactor.toFixed(2)),
                    nextReviewAntes: c.nextReview || null,
                    nextReviewDepois: r.nextReview,
                    src: "mobile",
                  };
                  return { ...c, ...r, historico: [...(c.historico || []), entry], updatedAt: nowIso() };
                }));
                showToast(`✓ ${restoredCount} cards restaurados via histórico`);
              }}>🔧 Restaurar {regressed.length} cards via histórico</button>
            </div>
          );
        })()}

        <div style={S.card}>
          <p style={{fontWeight:500,fontSize:14,marginBottom:4,color:"#f0e6d2"}}>💾 Backup dos dados</p>
          <p style={{fontSize:12,color:"#8d9890",marginBottom:10,lineHeight:1.5}}>
            Total: <strong style={{color:"#a8bdc4"}}>{cards.length}</strong> itens. Recomendado exportar 1x por semana.
            Os dados ficam salvos no navegador — limpe-o e você perde tudo se não tiver backup!
          </p>
          <div style={{display:"flex",gap:8,flexDirection:"column"}}>
            <button style={{...S.btn("success"),width:"100%"}} onClick={() => { exportBackup(cards); showToast("Backup exportado!"); }}>⬇️ Exportar backup (.json)</button>
            <button style={{...S.btn(),width:"100%"}} onClick={() => importRef.current.click()}>⬆️ Importar backup (.json)</button>
            <input ref={importRef} type="file" accept=".json,application/json" style={{display:"none"}} onChange={handleImport}/>
          </div>
        </div>

        <div style={{...S.card,marginBottom:0}}>

// Painel de histórico de revisões/edições de um card (audit trail).
// Detecta cards regredidos (audit trail check)
function detectRegressedCards(cards) {
  const out = [];
  for (const c of cards) {
    if (c.tipo === "questao") continue;
    const hist = (c.historico || []).filter(e => e.kind === "grade" || e.kind === "reset");
    if (hist.length === 0) continue;
    const last = hist[hist.length - 1];
    let expectedRep;
    if (last.kind === "grade") expectedRep = last.repDepois;
    else if (last.kind === "reset") expectedRep = 0;
    else continue;
    const currentRep = c.repetitions || 0;
    if (currentRep < expectedRep) {
      const allGrades = hist.filter(e => e.kind === "grade");
      const maxRep = Math.max(0, ...allGrades.map(e => e.repDepois));
      out.push({ card: c, currentRep, expectedRep, maxRep, lastEntry: last });
    }
  }
  return out;
}

function restoreCardFromHistory(card) {
  const hist = card.historico || [];
  let lastGrade = null;
  for (let i = hist.length - 1; i >= 0; i--) {
    if (hist[i].kind === "grade") { lastGrade = hist[i]; break; }
    if (hist[i].kind === "reset") return null;
  }
  if (!lastGrade) return null;
  const interval = lastGrade.intDepois || 1;
  const d = new Date(); d.setDate(d.getDate() + interval);
  return {
    interval,
    repetitions: lastGrade.repDepois || 0,
    easeFactor: lastGrade.easeDepois || 2.5,
    nextReview: localDateStr(d),
  };
}

// Heatmap da carga de revisão (atrasados + próximos 56 dias)
function ReviewLoadHeatmap({cards}) {
  const fmtDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const todayStr = today();
  const fc = cards.filter(c => c.tipo !== "questao" && c.nextReview);
  const counts = new Map();
  for (const c of fc) counts.set(c.nextReview, (counts.get(c.nextReview) || 0) + 1);
  const atrasados = fc.filter(c => c.nextReview < todayStr).length;
  const days = [];
  const d0 = new Date(todayStr + "T00:00:00");
  let max = 0;
  for (let i = 0; i < 56; i++) {
    const d = new Date(d0); d.setDate(d.getDate() + i);
    const ds = fmtDate(d);
    const n = counts.get(ds) || 0;
    if (n > max) max = n;
    days.push({ ds, n, offset: i, date: d });
  }
  const totalProx7 = days.slice(0, 7).reduce((s, e) => s + e.n, 0);
  const totalProx14 = days.slice(0, 14).reduce((s, e) => s + e.n, 0);
  const totalProx30 = days.slice(0, 30).reduce((s, e) => s + e.n, 0);
  const picoIdx = days.reduce((mi, e, i) => e.n > days[mi].n ? i : mi, 0);
  const pico = days[picoIdx];
  const cellColor = (n) => {
    if (n === 0) return "#1d2a26";
    const t = n / max;
    if (t < 0.33) return "#3d5a48";
    if (t < 0.66) return "#a8c4a2";
    if (t < 0.85) return "#e8d5a3";
    return "#e8b69a";
  };
  const monthLabel = (d) => ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"][d.getMonth()];
  return (
    <div style={{marginTop:10}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:8}}>
        {atrasados > 0 && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}} title={`${atrasados} cards atrasados`}>
            <div style={{fontSize:9,color:"#d9a3a3",fontFamily:"ui-monospace,monospace"}}>atras</div>
            <div style={{width:34,height:38,background:"#5a3030",border:"1px solid #d9a3a3",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"ui-monospace,monospace",fontSize:13,fontWeight:600,color:"#f0e6d2"}}>{atrasados}</div>
          </div>
        )}
        <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(8, 1fr)",gridTemplateRows:"repeat(7, 1fr)",gridAutoFlow:"column",gap:2}}>
          {days.map((e, i) => {
            const isHoje = e.offset === 0;
            const tip = `${e.ds}${isHoje ? " (hoje)" : ` (+${e.offset}d)`}: ${e.n} card${e.n===1?"":"s"}`;
            return (
              <div key={i} title={tip}
                style={{
                  background: cellColor(e.n),
                  border: isHoje ? "1px solid #e8b69a" : "none",
                  borderRadius: 2,
                  minHeight: 14,
                  fontSize: 8,
                  fontFamily: "ui-monospace,monospace",
                  color: e.n > 0 ? "#1d2a26" : "#3d5048",
                  textAlign: "center",
                  lineHeight: "14px",
                  fontWeight: e.n > 0 ? 600 : 400,
                }}>
                {e.n > 0 ? e.n : ""}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:9,color:"#5e6f66",fontFamily:"ui-monospace,monospace",marginBottom:6}}>
        <span>{monthLabel(days[0].date)}</span>
        <span>→</span>
        <span>{monthLabel(days[days.length-1].date)} (8 sem)</span>
      </div>
      <div style={{fontSize:11,color:"#8d9890",fontFamily:"ui-monospace,monospace",lineHeight:1.7}}>
        <div>próx 7d: <strong style={{color:"#f0e6d2"}}>{totalProx7}</strong> ({(totalProx7/7).toFixed(1)}/dia) · próx 14d: {totalProx14} ({(totalProx14/14).toFixed(1)}/dia) · próx 30d: {totalProx30} ({(totalProx30/30).toFixed(1)}/dia)</div>
        <div>pico: <strong style={{color:"#e8b69a"}}>{pico.n}</strong> em {pico.ds} (+{pico.offset}d)</div>
      </div>
    </div>
  );
}

  const fileRef = useRef();
  const chatEndRef = useRef();
  const pushTimerRef = useRef(null);
  const pushFlushNowRef = useRef(false);
  // Serialização de pushes: evita N pushes simultâneos com mesmo parent SHA
  const pushInFlightRef = useRef(false);
  const pushQueuedRef = useRef(false);
  // Refs do estado mais recente — push lê DAQUI (não do closure stale)
  const cardsRef = useRef([]);
  const deletedIdsRef = useRef({});
  const firstSaveSkipRef = useRef(true); // evita push imediatamente após load
  const lastSyncedShaRef = useRef(null); // SHA do commit em que nosso estado se baseia (anti-ping-pong)

  // Load: primeiro local, depois tenta pull e mescla.
  // CRÍTICO: re-lê localStorage AGORA após o fetch — se user revisou cards
  // durante o pull (5-10s), esses grades estão na storage e precisam entrar
  // no merge. Sem isso, mergeData(local stale, remote) clobba os grades.
  useEffect(() => {
    (async () => {
      const local = await loadData();
      setCards(local.cards || []);
      setDeletedIds(local.deletedIds || {});
      setLoaded(true);

      if (getGhToken() && (getRepo() || getGistId())) {
        setSyncState(s => ({ ...s, status: "syncing", error: "" }));
        try {
          const remote = getRepo() ? await repoFetch(getRepo()) : await gistFetch(getGistId());
          // Re-lê localStorage AGORA (não usa o snapshot stale `local`)
          const freshLocal = await loadData();
          const merged = mergeData(freshLocal, remote);
          setCards(merged.cards);
          setDeletedIds(merged.deletedIds);
          if (getRepo()) { try { lastSyncedShaRef.current = await repoHeadSha(getRepo()); } catch (_) {} }
          const ts = nowIso();
          saveLastSync(ts);
          setSyncState({ status: "ok", error: "", lastSync: ts });
          firstSaveSkipRef.current = true; // evita re-push do que acabou de vir
        } catch (e) {
          console.warn("Sync pull falhou:", e);
          setSyncState({ status: "error", error: e.message || String(e), lastSync: getLastSync() });
        }
      }
    })();
  }, []);

  // Save local imediato + push serializado (refs sempre apontam pro estado mais novo)
  useEffect(() => {
    if (!loaded) return;
    cardsRef.current = cards;
    deletedIdsRef.current = deletedIds;
    saveData({ cards, deletedIds });
    if (firstSaveSkipRef.current) { firstSaveSkipRef.current = false; return; }
    if (!getGhToken() || (!getRepo() && !getGistId())) return;

    if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
    const delay = pushFlushNowRef.current ? 0 : 1500;
    pushFlushNowRef.current = false;
    pushTimerRef.current = setTimeout(doPush, delay);
  }, [cards, deletedIds, loaded]);

  // doPush serializado: se já tem push em flight, marca "tem mais um pendente"

  // Sem isso, saves rápidos durante revisão geravam pushes paralelos com mesmo
  // parent SHA → 422 "Update is not a fast forward" → backlog perdido.
  async function doPush() {
    if (pushInFlightRef.current) { pushQueuedRef.current = true; return; }
    pushInFlightRef.current = true;
    setSyncState(s => ({ ...s, status: "syncing", error: "" }));
    try {
      const repo = getRepo();
      if (repo) {
        // ANTI-PING-PONG: se outro device pushou desde nosso último sync, puxa e
        // MESCLA antes de empurrar. Se o SHA não mudou, push direto (rápido).
        // Mescla se o remoto difere do baseline (inclui baseline null = mais seguro)
        const remoteSha = await repoHeadSha(repo);
        if (remoteSha && remoteSha !== lastSyncedShaRef.current) {
          console.log("[CAD] remoto mudou (outro device pushou) — merge antes do push");
          const remote = await repoFetch(repo);
          const merged = mergeData({ cards: cardsRef.current, deletedIds: deletedIdsRef.current }, remote);
          cardsRef.current = merged.cards;
          deletedIdsRef.current = merged.deletedIds;
          firstSaveSkipRef.current = true;
          setCards(merged.cards);
          setDeletedIds(merged.deletedIds);
        }
        const newSha = await repoUpdate(repo, cardsRef.current, deletedIdsRef.current);
        if (typeof newSha === "string") lastSyncedShaRef.current = newSha;
        else { try { lastSyncedShaRef.current = await repoHeadSha(repo); } catch (_) {} }
      } else {
        await gistUpdate(getGistId(), cardsRef.current, deletedIdsRef.current);
      }
      const ts = nowIso();
      saveLastSync(ts);
      setSyncState({ status: "ok", error: "", lastSync: ts });
    } catch (e) {
      console.warn("Sync push falhou:", e);
      setSyncState({ status: "error", error: e.message || String(e), lastSync: getLastSync() });
    } finally {
      pushInFlightRef.current = false;
      if (pushQueuedRef.current) {
        pushQueuedRef.current = false;
        // Coalesce: pequeno debounce pra agrupar saves rápidos consecutivos antes do próximo push
        if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
        pushTimerRef.current = setTimeout(doPush, 500);
      }
    }

        const item = new ClipboardItem({"text/plain": new Blob([txt],{type:"text/plain"}), "text/html": new Blob([html||txt],{type:"text/html"})});
        navigator.clipboard.write([item]).then(() => showToast("Copiado!")).catch(() => fallbackCopy(txt));
      } else fallbackCopy(txt);
    } catch { fallbackCopy(txt); }
  }

  function fallbackCopy(txt) {
    const ta = document.createElement("textarea");
    ta.value = txt;
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); showToast("Copiado!"); } catch { showToast("Não foi possível copiar"); }
    document.body.removeChild(ta);

  const CHAT_SS_KEY = "cad_chat_active";

  useEffect(() => {

      const raw = sessionStorage.getItem(CHAT_SS_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (Date.now() - (saved.ts || 0) > CHAT_TTL_MS) { sessionStorage.removeItem(CHAT_SS_KEY); return; }
      if (Array.isArray(saved.messages) && saved.messages.length) setChatMessages(saved.messages);

  }, [loaded]);
  useEffect(() => {
    if (!loaded) return;
    try {
      if (chatMessages.length === 0 && !chatContext) {
        sessionStorage.removeItem(CHAT_SS_KEY);
      } else {

  function startReview(tipo, limit) {
    const t = today();
    // Questões nunca entram no fluxo de revisão — só flashcards
    // Ordem: mais atrasado primeiro (nextReview asc), depois shuffle dentro do mesmo dia
    const todos = cards.filter(c => c.tipo !== "questao" && (tipo==="all"||c.tipo===tipo) && c.nextReview<=t);
    const porData = new Map();
    for (const c of todos) {
      const k = c.nextReview;
      if (!porData.has(k)) porData.set(k, []);
      porData.get(k).push(c);
    }
    const datasSorted = [...porData.keys()].sort();
    const q = [];
    for (const d of datasSorted) {
      const grupo = porData.get(d);
      grupo.sort(() => Math.random() - 0.5);
      q.push(...grupo);
    }
    const effectiveLimit = (limit && limit > 0) ? limit : getDailyLimit();
    const queue = (effectiveLimit && effectiveLimit > 0 && effectiveLimit < q.length) ? q.slice(0, effectiveLimit) : q;
    setReviewQueue(queue); setReviewIdx(0); setShowAnswer(false); setView("review");
  }

  function gradeCard(grade) {

    setCards(prev => prev.map(c => {
      if (c.id !== card.id) return c;
      const next = calcNextReview(c, grade);
      const entry = {
        ts: nowIso(),
        data: today(),
        kind: "grade",
        grade,
        intAntes: c.interval || 1,
        intDepois: next.interval,
        repAntes: c.repetitions || 0,
        repDepois: next.repetitions,
        easeAntes: Number((c.easeFactor || 2.5).toFixed(2)),
        easeDepois: Number(next.easeFactor.toFixed(2)),
        nextReviewAntes: c.nextReview || null,
        nextReviewDepois: next.nextReview,
        src: "mobile",
      };
      return { ...c, ...next, historico: [...(c.historico || []), entry], updatedAt: nowIso() };
    }));
    pushFlushNowRef.current = true; // força push imediato (sem esperar debounce)
    if (reviewIdx+1 < reviewQueue.length) { setReviewIdx(i => i+1); setShowAnswer(false); }
    else setView("reviewDone");
  }
